{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block head %}
<link rel="stylesheet" href="/styles/auth_form_animations.css">
{% endblock %}

{% block content %}
    <div class="auth-card">
        <h1>Login Page</h1><br>
        <form action="#" method="post" class="auth-form">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required placeholder="Username..."><br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br><br>

            <button type="submit">Login</button><br>
            <div></div>
        </form><br>
        <p class="lead">Don't have an account? <a href="/registration_page">Register here</a>.</p>
    </div>
    <script src="/js/login.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const card = document.querySelector(".auth-card");

            // Плавное появление
            setTimeout(() => {
                card.classList.add("show");
            }, 150);

            // Небольшой эффект shake при submit (если захочешь позже добавить валидацию)
        });
    </script>
{% endblock %}
